<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Liberty Central Bank</title>
    <style>
        * { box-sizing: border-box; }
        body {
            margin: 0;
            font-family: "Segoe UI", Arial, sans-serif;
            background: #f3f5f9;
            color: #16233b;
        }
        .topbar {
            background: #0b2545;
            color: #fff;
            padding: 14px 24px;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .topbar .mark { font-size: 22px; }
        .topbar h1 { font-size: 18px; margin: 0; font-weight: 700; letter-spacing: 0.5px; }
        .topbar small { display: block; font-weight: 400; opacity: 0.7; font-size: 11px; }
        .wrap { max-width: 460px; margin: 40px auto; }
        .card {
            background: #fff;
            border-radius: 10px;
            box-shadow: 0 6px 22px rgba(11, 37, 69, 0.12);
            padding: 26px;
        }
        h2 { margin: 0 0 4px; font-size: 20px; }
        p.sub { margin: 0 0 18px; color: #5a6b85; font-size: 13px; }
        label { display: block; font-size: 12px; font-weight: 600; margin: 12px 0 4px; }
        input {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #c7d0e0;
            border-radius: 6px;
            font-size: 14px;
        }
        input:focus { outline: none; border-color: #1d6fe0; }
        button.primary {
            width: 100%;
            margin-top: 18px;
            padding: 11px;
            border: none;
            border-radius: 6px;
            background: #1d6fe0;
            color: #fff;
            font-weight: 700;
            font-size: 15px;
            cursor: pointer;
        }
        button.primary:hover { background: #155bbd; }
        .msg { margin-top: 12px; font-size: 13px; min-height: 16px; }
        .err { color: #c0392b; }
        .balance {
            text-align: center;
            margin: 8px 0 18px;
        }
        .balance .num { font-size: 32px; font-weight: 800; color: #0b7a3b; }
        .balance .lbl { font-size: 12px; color: #5a6b85; }
        .row { display: flex; justify-content: space-between; font-size: 13px; padding: 6px 0; border-bottom: 1px solid #eef1f6; }
        .hidden { display: none; }
        .done {
            text-align: center;
            padding: 14px;
            background: #e9f8ee;
            border: 1px solid #b6e6c6;
            border-radius: 8px;
            color: #0b7a3b;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="topbar">
        <span class="mark">&#127963;</span>
        <h1>Liberty Central Bank<small>Your money. Our liberty.</small></h1>
    </div>

    <div class="wrap">
        <!-- Login view -->
        <div class="card" id="loginView">
            <h2>Online Banking</h2>
            <p class="sub">Sign in to access your account.</p>
            <label>Username</label>
            <input id="user" autocomplete="off" placeholder="username" />
            <label>Password</label>
            <input id="pass" type="password" autocomplete="off" placeholder="password" />
            <button class="primary" id="loginBtn">Sign In</button>
            <div class="msg err" id="loginMsg"></div>
        </div>

        <!-- Account view -->
        <div class="card hidden" id="acctView">
            <h2 id="welcome">Welcome</h2>
            <p class="sub">Liberty Central Bank &mdash; current account</p>
            <div class="balance">
                <div class="num" id="balNum">$0</div>
                <div class="lbl">Available balance</div>
            </div>
            <div class="row"><span>Account holder</span><b id="holder"></b></div>
            <div class="row"><span>IBAN</span><b id="iban"></b></div>
            <button class="primary" id="transferBtn">Transfer entire balance to my account</button>
            <div class="msg" id="acctMsg"></div>
            <div class="done hidden" id="doneBox"></div>
        </div>
    </div>

    <script>
        function call(fn) {
            var args = Array.prototype.slice.call(arguments, 1);
            return Promise.resolve(window[fn].apply(null, args));
        }
        function money(n) {
            return (typeof formatMoney === "function") ? formatMoney(n) : ("$" + n);
        }

        document.getElementById("loginBtn").onclick = function () {
            var user = document.getElementById("user").value;
            var pass = document.getElementById("pass").value;
            var msg = document.getElementById("loginMsg");
            msg.textContent = "";
            call("bankLogin", user, pass).then(function (res) {
                if (!res || !res.ok) {
                    msg.textContent = "Invalid username or password.";
                    return;
                }
                document.getElementById("loginView").classList.add("hidden");
                document.getElementById("acctView").classList.remove("hidden");
                document.getElementById("welcome").textContent = "Welcome, " + res.owner;
                document.getElementById("holder").textContent = res.owner;
                document.getElementById("iban").textContent = res.iban;
                document.getElementById("balNum").textContent = money(res.balance);
            });
        };

        document.getElementById("transferBtn").onclick = function () {
            var btn = document.getElementById("transferBtn");
            var msg = document.getElementById("acctMsg");
            btn.disabled = true;
            msg.textContent = "Processing transfer\u2026";
            call("transferToMyAccount").then(function (res) {
                if (!res || !res.ok) {
                    msg.className = "msg err";
                    msg.textContent = (res && res.error) || "Transfer failed.";
                    btn.disabled = false;
                    return;
                }
                msg.textContent = "";
                document.getElementById("balNum").textContent = money(0);
                var done = document.getElementById("doneBox");
                done.classList.remove("hidden");
                done.textContent = money(res.amount) + " transferred to your account (" + res.toIban + ").";
                btn.classList.add("hidden");
            });
        };
    </script>
</body>
</html>
